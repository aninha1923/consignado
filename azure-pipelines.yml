# Pipeline de Automação de Testes Agibank - Playwright + Allure
# Execução: Diária às 06:00 BRT (09:00 UTC)

trigger: none
pr: none

schedules:
  - cron: "0 7 * * *"
    displayName: Execução Diária de Testes
    branches:
      include:
        - master
    always: "true"

pool:
  name: Agibank
  demands:
    - java

resources:
  containers:
    - container: playwright
      image: mcr.microsoft.com/playwright:v1.55.0-jammy
      options: --shm-size=2gb

variables:
  TEST_RESULTS_DIR: "test-results"
  ALLURE_RESULTS_DIR: "allure-results"
  ALLURE_REPORT_DIR: "allure-report"

jobs:
  - job: TestesPlaywright
    displayName: "Testes automatizados(regressivos) - Agibank"
    pool:
      name: Agibank
      demands:
        - java
    container: playwright
    steps:
      - task: Cache@2
        displayName: "Cache dependências NPM"
        inputs:
          key: 'npm | "$(Agent.OS)" | "$(Build.SourcesDirectory)/package-lock.json"'
          restoreKeys: |
            npm | "$(Agent.OS)"
          path: $(Pipeline.Workspace)/.npm

      - script: |
          echo "=== Configurando Java no container ==="

          # Verificar se Java já existe no sistema
          if command -v java >/dev/null 2>&1; then
            echo "Java encontrado no sistema"
            JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
            echo "JAVA_HOME detectado: $JAVA_HOME"
          else
            echo "Java não encontrado. Baixando OpenJDK 11..."
            
            # Criar diretório para Java
            mkdir -p ~/java
            cd ~/java
            
            # Baixar OpenJDK 11 portátil
            wget -q https://download.java.net/java/GA/jdk11/9/GPL/openjdk-11.0.2_linux-x64_bin.tar.gz
            tar -xzf openjdk-11.0.2_linux-x64_bin.tar.gz
            
            # Configurar JAVA_HOME
            export JAVA_HOME="$(pwd)/jdk-11.0.2"
            export PATH="$JAVA_HOME/bin:$PATH"
            
            echo "JAVA_HOME configurado: $JAVA_HOME"
            
            # Voltar ao diretório original
            cd - > /dev/null
          fi

          # Verificar instalação
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version

          # Persistir JAVA_HOME para próximos steps
          echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME"
          echo "##vso[task.setvariable variable=JAVA_PATH]$JAVA_HOME/bin"

          echo "✅ Java configurado com sucesso"
        displayName: "Configurar Java"

      - script: |
          echo "=== Verificando ambiente do container Playwright ==="
          node -v
          npm -v
          npx playwright --version

          echo "=== Verificando Java ==="
          echo "JAVA_HOME: $JAVA_HOME"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version

          echo "=== Verificando browsers pré-instalados ==="
          npx playwright list-files | head -10 || echo "Lista de arquivos não disponível"

          echo "=== Container configurado corretamente ==="
        displayName: "Verificar ambiente do container"
        env:
          JAVA_HOME: $(JAVA_HOME)

      - script: |
          echo "=== Instalando dependências NPM ==="
          npm ci --cache $(Pipeline.Workspace)/.npm

          echo "=== Instalando Allure CLI ==="
          export JAVA_HOME=$(JAVA_HOME)
          export PATH="$JAVA_HOME/bin:$PATH"

          npm install allure-commandline@2.24.0
          export PATH="$PATH:$(pwd)/node_modules/.bin"

          # Verificar se Allure funciona com Java
          echo "Testando Allure com Java configurado..."
          allure --version
          echo "✅ Allure CLI instalado com sucesso"
        displayName: "Instalar dependências"
        env:
          JAVA_HOME: $(JAVA_HOME)

      - script: |
          echo "=== Configurando variáveis de ambiente ==="
          cat > .env << EOF
          BASE_URL=$(BASE_URL)
          HOME_PATH=$(HOME_PATH)
          TEXTO_PADRAO=$(TEXTO_PADRAO)
          TEXTO_INVALIDO=$(TEXTO_INVALIDO)
          BOTAO_LUPA=$(BOTAO_LUPA)
          INPUT_BUSCA=$(INPUT_BUSCA)
          MENU_BUSCA=$(MENU_BUSCA)
          EOF

          echo "✅ Arquivo .env configurado"
        displayName: "Configurar ambiente"
        continueOnError: "false"

      - script: |
          echo "=== Executando testes ==="

          # Configurar Java para este step
          export JAVA_HOME=$(JAVA_HOME)
          export PATH="$JAVA_HOME/bin:$PATH"

          # Verificar se Playwright foi instalado corretamente
          echo "=== Verificando instalação do Playwright ==="
          npx playwright --version || {
            echo "❌ Playwright não foi instalado corretamente"
            exit 1
          }

          # Configurar otimizações para container
          export PLAYWRIGHT_TIMEOUT=60000
          export TEST_TIMEOUT=120000
          export DISPLAY=:99

          echo "🚀 Iniciando testes no container Playwright..."

          # Executar testes com melhor tratamento de erros
          npm run test:e2e 2>&1 | tee test-output.log || {
            EXIT_CODE=$?
            echo "⚠️ Primeira execução falhou ($EXIT_CODE)"
            
            # Verificar se é erro de sintaxe/compatibilidade
            if grep -q "SyntaxError.*Unexpected token" test-output.log; then
              echo "❌ Erro de compatibilidade detectado. Verificando versões..."
              echo "Node.js: $(node -v)"
              echo "Playwright: $(npx playwright --version)"
              echo "❌ Falha por incompatibilidade de versões"
              exit 1
            fi
            
            if [ $EXIT_CODE -eq 1 ]; then
              echo "🔄 Retry com timeouts maiores..."
              export PLAYWRIGHT_TIMEOUT=120000
              export TEST_TIMEOUT=240000
              npm run test:e2e || echo "⚠️ Testes concluídos com falhas"
            fi
          }
        displayName: "Executar testes"
        env:
          CI: true
          NODE_OPTIONS: "--max-old-space-size=4096"
          JAVA_HOME: $(JAVA_HOME)
        timeoutInMinutes: "30"

      - script: |
          echo "=== Limpeza ==="
          find $(TEST_RESULTS_DIR) -name "error-context.md" -delete 2>/dev/null || true
          find $(ALLURE_RESULTS_DIR) -name "error-context.md" -delete 2>/dev/null || true
        displayName: "Limpar arquivos temporários"
        condition: succeededOrFailed()

      - task: PublishTestResults@2
        displayName: "Publicar resultados"
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "$(TEST_RESULTS_DIR)/**/*.xml"
          mergeTestResults: true
          testRunTitle: "Agibank Tests - $(Build.BuildNumber)"
          failTaskOnFailedTests: false
        condition: always()
        continueOnError: true

      - script: |
          echo "=== Gerando relatório Allure ==="
          export JAVA_HOME=$(JAVA_HOME)
          export PATH="$JAVA_HOME/bin:$(pwd)/node_modules/.bin:$PATH"

          # Verificar se Java está disponível
          echo "Verificando Java para Allure..."
          java -version

          npm run allure:generate:html || echo "⚠️ Falha no relatório"
        displayName: "Gerar relatório Allure"
        condition: always()
        env:
          JAVA_HOME: $(JAVA_HOME)

      - script: |
          CURRENT_DATE=$(date +"%d-%m-%Y")
          REPORT_NAME="relatorio-pos-online-${CURRENT_DATE}.html"

          if [ -f "$(ALLURE_REPORT_DIR)/index.html" ]; then
            mv "$(ALLURE_REPORT_DIR)/index.html" "$(ALLURE_REPORT_DIR)/${REPORT_NAME}"
            echo "##vso[task.setvariable variable=REPORT_FILE_PATH]$(ALLURE_REPORT_DIR)/${REPORT_NAME}"
            echo "✅ Relatório: ${REPORT_NAME}"
          else
            echo "⚠️ Relatório não encontrado"
          fi
        displayName: "Preparar relatório"
        condition: succeededOrFailed()

      - task: PublishBuildArtifacts@1
        displayName: "Publicar relatório"
        inputs:
          PathtoPublish: "$(REPORT_FILE_PATH)"
          ArtifactName: "relatorio-pos-online-$(Build.BuildNumber)"
        condition: succeededOrFailed()

      - script: |
          echo "=== Resumo ==="
          echo "Build: $(Build.BuildNumber)"
          echo "Status: $(Agent.JobStatus)"

          [ -d "$(TEST_RESULTS_DIR)" ] && echo "📊 Resultados: ✅"
          [ -f "$(ALLURE_REPORT_DIR)"/*.html ] && echo "📈 Relatório: ✅"
        displayName: "Resumo execução"
        condition: always()
